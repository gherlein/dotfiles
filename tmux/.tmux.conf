# ~/.tmux.conf
# Optimized for: Claude Code, Emacs/mg, Zed, Makefiles, 3-screen setup
# Pairs with the Alacritty config in alacritty.toml
#
# Install plugins: press prefix+I (capital i) after first launch
# (requires tmux plugin manager: https://github.com/tmux-plugins/tpm)
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

# ─────────────────────────────────────────────────────────────────────────────
# TERMINAL & COLOR
# ─────────────────────────────────────────────────────────────────────────────

# Tell tmux to report itself as a 256-color terminal
# WHY: Enables full color palette for themes, syntax highlighting, and UI elements
# Without this, you get limited 16-color mode that looks washed out
set -g  default-terminal   "tmux-256color"

# Enable 24-bit true color (16.7 million colors) passthrough
# WHY: Modern terminals support millions of colors, not just 256. This lets
# applications like Vim, Emacs, and Claude Code display gradients, accurate
# theme colors, and rich syntax highlighting exactly as designed
set -ga terminal-overrides ",xterm-256color:Tc"    # true 24-bit color passthrough
set -ga terminal-overrides ",alacritty:Tc"         # explicit alacritty true color

# Undercurl support (wavy underlines for errors/warnings)
# WHY: Modern editors and linters use wavy underlines to show errors (red wavy),
# warnings (yellow wavy), etc. Without this, you just get straight underlines
# or no underlines at all, making it harder to distinguish error types
# Used by: Emacs flycheck, Vim ALE, language servers (LSP), Claude Code diagnostics
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# OSC 52 clipboard passthrough — REQUIRED for Claude Code clipboard integration
# WHY: Allows applications running inside tmux to access your system clipboard
# Without this, copying text in Claude Code, Vim, or Emacs inside tmux won't
# put it on your system clipboard (Cmd+V won't work). With this enabled, you
# can copy inside tmux and paste anywhere on your system
# CRITICAL for: Claude Code, Neovim, Emacs, remote SSH sessions
set -s set-clipboard on


# ─────────────────────────────────────────────────────────────────────────────
# GENERAL SETTINGS
# ─────────────────────────────────────────────────────────────────────────────

# Keep 50,000 lines of scrollback history per pane
# WHY: When running long builds (make, cargo, npm), you want to scroll back and
# see the full output. Default is 2000 lines which gets truncated quickly. With
# 50k lines, you can scroll back through the entire build log, find errors, and
# copy stack traces. Essential for debugging failed CI runs locally
set -g  history-limit    50000

# Enable mouse support for scrolling, pane selection, and resizing
# WHY: You can click to switch panes, drag borders to resize, and scroll with
# your mouse wheel. Makes tmux feel modern and accessible. You can still use
# keyboard shortcuts, but mouse support is convenient for quick navigation
set -g  mouse            on

# Reduce ESC key delay to 10ms (default is 500ms)
# WHY: Emacs and Vim use ESC heavily. With default 500ms delay, every ESC press
# feels sluggish because tmux waits to see if it's part of an escape sequence.
# 10ms is imperceptible to humans but fast enough for key sequences to work.
# CRITICAL for Emacs users - makes ESC feel instant
set -sg escape-time      10

# Send focus events to applications running inside tmux
# WHY: Lets Emacs/Vim know when you switch panes so they can auto-reload files
# changed externally, update git status, or trigger auto-save. Without this,
# editors don't know you switched away and back
set -g  focus-events     on

# Number windows and panes starting at 1 instead of 0
# WHY: Keyboard number row goes 1-9, not 0-9. With base-index 1, pressing
# Cmd/Super+1 goes to window 1 (not window 0). More intuitive and matches
# browser tab shortcuts. Your left pinky thanks you
set -g  base-index       1
set -g  pane-base-index  1

# Automatically renumber windows when one is closed
# WHY: If you close window 2, windows 3,4,5 become 2,3,4. Keeps numbering
# sequential without gaps. Makes window switching predictable - you won't
# suddenly have windows 1,3,5,7 after closing a few
set -g  renumber-windows on

# Keep status messages visible for 2 seconds
# WHY: Default is 750ms which disappears before you can read it. 2s gives you
# time to read "tmux.conf reloaded" or error messages without being intrusive
set -g  display-time     2000

# Refresh status bar every 5 seconds
# WHY: Updates the clock and any dynamic status info. Balance between freshness
# (5s means clock is never more than 5s stale) and performance (updating every
# 1s would be wasteful). You'll see the time update while you work
set -g  status-interval  5


# ─────────────────────────────────────────────────────────────────────────────
# KEY BINDINGS
# ─────────────────────────────────────────────────────────────────────────────

# Reload config with prefix+r
# WHY: After editing this file, you want changes to take effect immediately
# without restarting tmux (which would lose your session state). Press prefix+r
# and see "tmux.conf reloaded" confirmation. Changes apply to the current session
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Split windows and create new windows in the current directory
# WHY: Default tmux behavior opens new panes in your home directory (~), which
# is annoying. If you're in ~/projects/myapp and split, you want the new pane
# to also be in ~/projects/myapp, not ~. Saves you from typing "cd" constantly.
# USAGE: prefix+" (horizontal split), prefix+% (vertical split), prefix+c (new window)
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind c   new-window      -c "#{pane_current_path}"

# Vim-style pane navigation with prefix+hjkl
# WHY: Vim users are trained on hjkl for left/down/up/right. Using arrow keys
# requires moving your hand from home row. With this, prefix+h goes left,
# prefix+j goes down, prefix+k goes up, prefix+l goes right. Fast and ergonomic.
# ALSO: Alacritty config can bind Cmd/Super+hjkl for even faster pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix+Shift+hjkl (capital letters)
# WHY: Sometimes one pane needs more space. Hold prefix, then tap H/J/K/L to
# nudge borders by 5 columns/rows at a time. The -r flag means "repeatable" -
# you can hold prefix once, then tap J multiple times to keep resizing down.
# Much faster than dragging with mouse
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zoom current pane to fullscreen with prefix+Space
# WHY: Sometimes you want one pane to fill the entire window temporarily (like
# when reading long output or focusing on code). Press prefix+Space to zoom in,
# press it again to zoom out and restore the layout. Great for presentations
# or focusing. Also available as Cmd/Super+Z in Alacritty
bind Space resize-pane -Z

# Move windows left/right in the tab list with prefix+< and prefix+>
# WHY: You create windows in some order but want to rearrange them. prefix+<
# swaps current window with the one to its left, prefix+> swaps right. The -r
# flag lets you tap repeatedly to move multiple positions. The -d flag prevents
# auto-switching to the swapped window (stays on current window)
bind-key -r '<' swap-window -d -t -1
bind-key -r '>' swap-window -d -t +1

# Quick session switcher with fzf (requires fzf to be installed)
# WHY: If you have multiple tmux sessions (work, personal, experiments), this
# gives you a fuzzy-searchable popup menu to switch between them instantly.
# Press prefix+S, type a few letters, Enter. Much faster than prefix+s (default
# session list) because fzf filters as you type. Works like Cmd+P in VS Code
bind S display-popup -E "tmux list-sessions | fzf --reverse | cut -d: -f1 | xargs tmux switch-client -t"

# Kill current session with confirmation (prefix+Shift+X)
# WHY: Normally you exit all panes with Ctrl-D to kill a session, but sometimes
# you want to nuke the entire session immediately. This prompts "Kill session
# mysession? (y/n)" so you don't accidentally destroy work. Safer than kill-session
# without confirmation, faster than exiting each pane individually
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# ─────────────────────────────────────────────────────────────────────────────
# COPY MODE — Vi keys
# ─────────────────────────────────────────────────────────────────────────────

# Use Vi keybindings in copy mode (vs Emacs keybindings)
# WHY: Vi/Vim navigation (hjkl, w/b for words, gg/G for top/bottom) is fast and
# widely known. If you use Vim or modal editing, this feels natural. For Emacs
# users, you can change this to "set -g mode-keys emacs" to use Ctrl+N/P/F/B
set -g  mode-keys vi

# Enter copy mode with prefix+[ and paste with prefix+]
# WHY: Copy mode lets you scroll back through history, search text, and select
# text to copy (like visual mode in Vim). prefix+[ enters copy mode, then use
# Vi keys to navigate. prefix+] pastes what you copied. Essential for copying
# error messages, stack traces, or command output
bind [ copy-mode
bind ] paste-buffer

# In copy mode: v to start selection (like Vim visual mode)
# WHY: Mirrors Vim's visual mode. Navigate to where you want to start copying,
# press v, move to the end, press y to yank (copy). Muscle memory for Vim users
bind -T copy-mode-vi v   send-keys -X begin-selection

# In copy mode: y to yank (copy) selection to clipboard
# WHY: After selecting text with v, press y to copy it to your system clipboard.
# The "copy-pipe-and-cancel" sends it to pbcopy (macOS) or xclip/wl-copy (Linux)
# and then exits copy mode. Now you can Cmd+V or Ctrl+V anywhere on your system
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "bash -c 'command -v pbcopy >/dev/null && pbcopy || command -v xclip >/dev/null && xclip -in -selection clipboard || wl-copy'"

# In copy mode: Ctrl+V to toggle rectangular (block) selection
# WHY: Sometimes you want to copy a vertical column of text (like copying the
# second column from a table, or specific fields from aligned log output). Press
# Ctrl+V to switch to block mode, select a rectangle, press y to copy. Perfect
# for Makefiles with aligned columns or CSV-like data
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# In copy mode: Escape to exit copy mode
# WHY: Quick way to bail out of copy mode without copying anything. Like pressing
# Escape in Vim to exit visual mode. Gets you back to normal pane interaction
bind -T copy-mode-vi Escape send-keys -X cancel


# ─────────────────────────────────────────────────────────────────────────────
# STATUS BAR
# ─────────────────────────────────────────────────────────────────────────────

# Enable status bar and position it at the bottom
# WHY: Status bar shows session name, window list, hostname, date, and time at
# a glance. Bottom position keeps it out of the way of Emacs modeline or editor
# status bars. Change to "top" if you prefer it above your panes
set -g status on
set -g status-position bottom
set -g status-justify  left

# Catppuccin Mocha color palette (matches Alacritty theme for consistency)
# WHY: Using named color variables makes it easy to tweak the theme later. These
# hex colors create a dark, modern theme that's easy on the eyes and matches
# popular editor themes. Catppuccin Mocha is designed for long coding sessions
BG="#1e1e2e"        # dark background
FG="#cdd6f4"        # light foreground text
ACCENT="#89b4fa"    # blue accent for highlights
GREEN="#a6e3a1"     # green for success/positive info
YELLOW="#f9e2af"    # yellow for warnings/attention
RED="#f38ba8"       # red for errors (not used yet, but available)

set -g status-style "bg=$BG,fg=$FG"

# Left side: session name with accent background
# WHY: Shows which tmux session you're in. Essential when running multiple
# sessions (work, personal, experiments). The accent background makes it stand
# out. Format: " SessionName " with bold text
# #S = session name
set -g status-left-length 30
set -g status-left "#[bg=$ACCENT,fg=$BG,bold] #S #[bg=$BG,fg=$ACCENT]"

# Right side: hostname | date | time
# WHY: On a 3-screen setup or when SSH'd into multiple machines, hostname tells
# you which machine you're on. Date/time are always visible without checking
# your system tray. Updates every 5 seconds (status-interval setting)
# #H = hostname, %a = weekday, %d = day, %b = month, %H:%M = time (24h format)
set -g status-right-length 60
set -g status-right "#[fg=$YELLOW]#H #[fg=$FG]│ #[fg=$GREEN]%a %d %b #[fg=$FG]│ #[fg=$ACCENT,bold]%H:%M"

# Window list in the middle: shows all windows with their numbers
# WHY: Each window gets a tab in the status bar. Current window is highlighted
# with accent background. Shows window number and name (usually the running
# program or directory). Click to switch or use prefix+number
# #I = window index, #W = window name
set -g window-status-format         " #I:#W "
set -g window-status-current-format "#[bg=$ACCENT,fg=$BG,bold] #I:#W "
set -g window-status-separator      ""

# Pane borders: subtle gray for inactive, bright blue for active pane
# WHY: Visual indicator of which pane has focus. Active pane gets bright blue
# border so you always know where your keystrokes are going. Inactive panes
# have subtle gray borders that fade into the background
set -g pane-border-style        "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# Style for tmux command messages (shown when you press prefix+r, etc)
# WHY: Makes messages pop out with accent background and bold text so you don't
# miss important feedback like "tmux.conf reloaded" or error messages
set -g message-style "bg=$ACCENT,fg=$BG,bold"


# ─────────────────────────────────────────────────────────────────────────────
# PLUGINS (optional but recommended)
# ─────────────────────────────────────────────────────────────────────────────
# Tmux Plugin Manager (TPM) provides a package manager for tmux plugins
# INSTALL: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# USAGE: Uncomment the plugins below, reload config (prefix+r), then press
#        prefix+I (capital i) to install plugins. prefix+U to update plugins

# WHY USE PLUGINS: Extend tmux with features like session persistence across
# reboots, better defaults, and seamless navigation between editor and tmux panes

# set -g @plugin 'tmux-plugins/tpm'
# WHY: The plugin manager itself. Required for other plugins to work

# set -g @plugin 'tmux-plugins/tmux-sensible'
# WHY: Provides sensible default settings that most people want. Includes things
# like better scrolling, mouse support tweaks, and improved key response times.
# Good starting point if you're new to tmux

# set -g @plugin 'tmux-plugins/tmux-resurrect'
# WHY: Save tmux sessions to disk and restore them after reboot or crash. Press
# prefix+Ctrl+S to save all sessions, windows, and panes. Press prefix+Ctrl+R to
# restore. Your entire workspace survives reboots. Life-changing for people who
# keep complex multi-window/pane layouts
# CAVEAT: Doesn't restore running programs, just the layout and working directories

# set -g @plugin 'tmux-plugins/tmux-continuum'
# WHY: Auto-saves your tmux sessions every 15 minutes and can auto-restore on
# tmux start. Works with tmux-resurrect. Set it and forget it - your sessions
# are always backed up. Great for laptop users who restart frequently

# set -g @plugin 'christoomey/vim-tmux-navigator'
# WHY: Seamless navigation between Vim/Emacs splits and tmux panes with the same
# keybindings (Ctrl+hjkl). Treats editor splits and tmux panes as one unified
# space. Your brain doesn't have to switch between "am I in Vim or tmux?" modes

# Plugin configuration options (uncomment if using plugins above)
# set -g @resurrect-capture-pane-contents 'on'
# WHY: When saving sessions, also save the scrollback contents of each pane.
# Lets you restore not just the layout but also the terminal history (build
# output, logs, etc). Uses more disk space but very useful

# set -g @continuum-restore 'on'
# WHY: Automatically restore your last saved session when tmux starts. You won't
# even notice you rebooted - all your windows and panes come back automatically

# Initialize TPM (keep this line at the very bottom of tmux.conf)
# run '~/.tmux/plugins/tpm/tpm'
