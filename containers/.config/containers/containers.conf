[containers]
# default resource limits
default_ulimits = ["nofile=65536:65536"]

# default mounts added to every container
# mounts = ["/etc/localtime:/etc/localtime:ro"]

[engine]
# default runtime
runtime = "crun"  # or "runc"

# keep stopped containers around (podman ps -a)
# remote = false

[network]
# default network backend
network_backend = "netavark"  # or "cni"

