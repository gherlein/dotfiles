# ~/.config/kitty/kitty.conf
# Kitty terminal emulator configuration
# https://sw.kovidgoyal.net/kitty/conf/

# ─────────────────────────────────────────────────────────────────────────────
# FONT
# ─────────────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
font_size        12.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# ─────────────────────────────────────────────────────────────────────────────
# THEME
# ─────────────────────────────────────────────────────────────────────────────
background #4f4f4f

# ─────────────────────────────────────────────────────────────────────────────
# WINDOW
# ─────────────────────────────────────────────────────────────────────────────
window_padding_width     8
# WHY: Kitty always paints the padding region with the background color,
# so no separate padding-color directive is needed.
# WHY: remember_window_size (default yes) reuses the last manual size;
# omit initial_window_width/height so it can take effect.
remember_window_size     yes
hide_window_decorations  no
sync_to_monitor          no

# WHY: Enable split layouts for pane support
enabled_layouts splits,tall,stack

# ─────────────────────────────────────────────────────────────────────────────
# CURSOR
# ─────────────────────────────────────────────────────────────────────────────
cursor_shape       block
cursor_blink_interval  0

# ─────────────────────────────────────────────────────────────────────────────
# MOUSE
# ─────────────────────────────────────────────────────────────────────────────
# WHY: Hiding cursor while typing avoids it obscuring the current line
mouse_hide_wait    3.0

# ─────────────────────────────────────────────────────────────────────────────
# SHELL INTEGRATION
# ─────────────────────────────────────────────────────────────────────────────
# WHY: Enables cursor shape changes, prompt marking, and title updates
shell_integration enabled

# ─────────────────────────────────────────────────────────────────────────────
# SCROLLBACK
# ─────────────────────────────────────────────────────────────────────────────
scrollback_lines 99000

# ─────────────────────────────────────────────────────────────────────────────
# COPY / PASTE
# ─────────────────────────────────────────────────────────────────────────────
# WHY: Automatically copy selected text to clipboard, standard power-user behavior
copy_on_select   clipboard
# WHY: Strip trailing whitespace so pasted commands don't have hidden spaces
strip_trailing_spaces smart

# ─────────────────────────────────────────────────────────────────────────────
# PERFORMANCE
# ─────────────────────────────────────────────────────────────────────────────
# WHY: Reduces visual noise during resize operations
resize_draw_strategy static

focus_follows_mouse no

# ─────────────────────────────────────────────────────────────────────────────
# KEYBINDINGS
# ─────────────────────────────────────────────────────────────────────────────

# New OS window
map ctrl+shift+n new_os_window

# WHY: Create horizontal split with new pane below (overrides default new_tab)
map ctrl+shift+t launch --location=hsplit --cwd=current

# WHY: Resize splits to adjust pane widths/heights
map ctrl+shift+left  resize_window narrower 5
map ctrl+shift+right resize_window wider 5
map ctrl+shift+up    resize_window taller 5
map ctrl+shift+down  resize_window shorter 5

# Quick font size adjustment without touching config
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

# Remote Control
allow_remote_control yes

allow_remote_control yes

map ctrl+shift+v paste_from_clipboard

